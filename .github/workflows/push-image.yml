name: LatestImage

on:
  push:
    branches:
      - main
      - refactor/dashboard
      - feature/*

jobs:
  build-and-push-api:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: warjiang/karmada-dashboard-api
      BINARY_NAME: karmada-dashboard-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '^1.22.2'
      - name: Detect os info
        id: os
        run: |
          echo "os=$(go env GOHOSTOS)" >> $GITHUB_OUTPUT
          echo "arch=$(go env GOHOSTARCH)" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata for the Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: $IMAGE_NAME
      - name: Build karmada-dashboard-api binary
        run: make karmada-dashboard-api
      - name: Build karmada-dashboard-api image
        run: make image-karmada-dashboard-api
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          file: "cluster/images/Dockerfile"
          context: "_output/bin/${{ steps.os.outputs.os }}/${{ steps.os.outputs.arch }}"
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BINARY=${BINARY_NAME}
            BUILD_PLATFORMS=${{ steps.os.outputs.os }}/${{ steps.os.outputs.arch }}

